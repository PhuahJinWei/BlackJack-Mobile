<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blackjack</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  :root{
    --card-w:80px;
    --card-h:116px;
    --felt:#0b6623;
    --felt-dark:#084a1a;
    --gold:#d4a844;
    --gold-dim:#9e7e34;
  }

  body{
    font-family:'Segoe UI',system-ui,sans-serif;
    background:#1a1a2e;
    color:#fff;
    min-height:100vh;
    overflow-x:hidden;
    user-select:none;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  /* ---------- HEADER ---------- */
  header{
    text-align:center;
    padding:10px 0 4px;
    font-size:1.4rem;
    font-weight:700;
    letter-spacing:2px;
    color:var(--gold);
    text-shadow:0 2px 6px rgba(0,0,0,.5);
  }
  header span{font-size:.7rem;color:#ffffffaa;display:block;font-weight:400;letter-spacing:0}

  /* ---------- TABLE CONTAINER ---------- */
  #table-container{
    width:100%;
    max-width:960px;
    padding:8px 16px 10px;
  }

  /* ---------- OVAL TABLE ---------- */
  #table{
    position:relative;
    width:100%;
    padding-bottom:68%;
    border-radius:50%;
    background:
      radial-gradient(ellipse at 50% 48%,#0f8a30 0%,#0b6623 40%,#07521a 70%,#053f14 100%);
    border:14px solid #5c3a1e;
    box-shadow:
      inset 0 0 80px rgba(0,0,0,.35),
      inset 0 0 4px rgba(255,255,255,.05),
      0 0 0 4px #3a2210,
      0 0 0 18px #6b4226,
      0 0 0 22px #3a2210,
      0 10px 40px rgba(0,0,0,.6);
    overflow:visible;
  }

  /* ---------- SEATS ---------- */
  .seat{
    position:absolute;
    display:flex;
    justify-content:center;
    z-index:2;
  }
  .seat-dealer{
    top:-2%;
    left:50%;
    transform:translateX(-50%);
  }
  .seat-left{
    top:38%;
    left:-4%;
    transform:translateY(-50%);
  }
  .seat-right{
    top:38%;
    right:-4%;
    transform:translateY(-50%);
  }
  .seat-player{
    bottom:-4%;
    left:50%;
    transform:translateX(-50%);
    z-index:4;
  }

  /* ---------- PLAYER AREA ---------- */
  .player-area{
    background:rgba(0,0,0,.30);
    border-radius:14px;
    padding:8px 14px 10px;
    position:relative;
    transition:box-shadow .3s;
    min-width:170px;
    text-align:center;
    backdrop-filter:blur(2px);
  }
  .player-area.active-turn{
    box-shadow:0 0 0 3px var(--gold),0 0 22px rgba(212,168,68,.5);
  }
  .player-area.bust .label .status{color:#ff5555}
  .player-area.blackjack .label .status{color:#ffd700}
  .player-area.win .label .status{color:#55ff55}
  .player-area.lose .label .status{color:#ff5555}
  .player-area.push .label .status{color:#aaaaff}

  .label{
    display:flex;align-items:center;gap:8px;
    margin-bottom:6px;font-size:.82rem;
    justify-content:center;
    flex-wrap:wrap;
  }
  .label .name{
    font-weight:700;
    color:var(--gold);
  }
  .label .score{
    background:rgba(255,255,255,.12);
    padding:1px 8px;
    border-radius:20px;
    font-size:.75rem;
    min-width:30px;
    text-align:center;
  }
  .label .status{
    font-weight:600;
    font-size:.75rem;
  }

  .hand{
    display:flex;
    gap:6px;
    justify-content:center;
    min-height:calc(var(--card-h) + 4px);
    align-items:flex-start;
    position:relative;
  }

  .hand.drop-target{
    box-shadow:0 0 20px rgba(212,168,68,.5);
    border-radius:10px;
  }

  /* ---------- CARD ---------- */
  .card-slot{
    width:var(--card-w);
    height:var(--card-h);
    perspective:800px;
    flex-shrink:0;
    transition:transform .2s ease,z-index 0s;
    position:relative;
  }
  .card-slot:hover{
    transform:scale(1.12);
    z-index:10;
  }
  .card{
    width:100%;height:100%;
    position:relative;
    transform-style:preserve-3d;
    transition:transform .5s ease;
    border-radius:8px;
  }
  .card.flipped{transform:rotateY(180deg)}

  .card-face{
    position:absolute;
    width:100%;height:100%;
    backface-visibility:hidden;
    border-radius:8px;
    overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,.4);
  }
  .card-face img{
    width:100%;height:100%;
    object-fit:cover;
    display:block;
  }
  .card-front{transform:rotateY(180deg)}
  .card-back{}

  /* flippable hint */
  .card-slot[data-flippable="true"]{
    cursor:grab;
  }
  .card-slot[data-flippable="true"]::after{
    content:'';
    position:absolute;
    top:0;right:-2px;bottom:0;
    width:18px;
    background:linear-gradient(to left,rgba(212,168,68,.4),transparent);
    border-radius:0 8px 8px 0;
    pointer-events:none;
    animation:flipHint 1.5s ease-in-out infinite;
  }
  @keyframes flipHint{
    0%,100%{opacity:.4;transform:translateX(0)}
    50%{opacity:.9;transform:translateX(3px)}
  }

  /* deal animation - origin from deck center via CSS custom property */
  .card-slot{
    opacity:0;
    animation:none;
  }
  .card-slot.dealt{
    animation:dealIn .45s ease forwards;
  }
  @keyframes dealIn{
    0%{opacity:0;transform:var(--deal-from,translateY(-40px) scale(.7))}
    70%{opacity:1;transform:scale(1.03)}
    100%{opacity:1;transform:scale(1)}
  }

  /* ---------- HOVER FAN FOR OPPONENT HANDS ---------- */
  .hand.fanned .card-slot{
    transition:transform .3s ease,margin .3s ease;
    transform-origin:bottom center;
  }

  /* ---------- TABLE CENTER (deck + pot) ---------- */
  #table-center{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
    z-index:1;
  }
  #deck-pile{
    position:relative;
    width:var(--card-w);
    height:var(--card-h);
    cursor:grab;
    transition:transform .15s;
  }
  #deck-pile:hover{
    transform:scale(1.06);
  }
  #deck-pile.active-drag{
    transform:scale(.95);
  }
  .deck-card{
    position:absolute;
    width:100%;height:100%;
    border-radius:8px;
    box-shadow:0 2px 8px rgba(0,0,0,.45);
    object-fit:cover;
  }

  #pot-area{
    width:76px;
    height:76px;
    border-radius:50%;
    border:2px dashed rgba(212,168,68,.3);
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    transition:all .2s;
    font-size:.7rem;
    color:rgba(255,255,255,.3);
  }
  #pot-area.has-chips{
    border-color:rgba(212,168,68,.5);
  }
  #pot-area.drag-over{
    border-color:var(--gold);
    background:rgba(212,168,68,.15);
    box-shadow:0 0 24px rgba(212,168,68,.35);
    transform:scale(1.1);
  }
  .pot-chip{
    position:absolute;
    width:28px;height:28px;
    border-radius:50%;
    border:2px dashed rgba(255,255,255,.45);
    display:flex;align-items:center;justify-content:center;
    font-size:.5rem;font-weight:700;color:#fff;
    text-shadow:0 1px 2px rgba(0,0,0,.6);
    pointer-events:none;
  }

  #pot-label{
    position:absolute;
    bottom:-18px;
    font-size:.7rem;
    color:var(--gold);
    font-weight:700;
    white-space:nowrap;
  }

  /* ---------- SHUFFLE OVERLAY ---------- */
  #shuffle-overlay{
    position:fixed;inset:0;
    background:rgba(0,0,0,.65);
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    z-index:100;
    opacity:0;pointer-events:none;
    transition:opacity .3s;
  }
  #shuffle-overlay.visible{opacity:1;pointer-events:auto}
  #shuffle-overlay h2{
    color:var(--gold);font-size:1.4rem;margin-bottom:20px;
    letter-spacing:3px;
  }
  .shuffle-cards{
    position:relative;
    width:100px;height:140px;
  }
  .shuffle-cards .s-card{
    position:absolute;
    width:100%;height:100%;
    border-radius:10px;overflow:hidden;
    box-shadow:0 4px 16px rgba(0,0,0,.5);
    animation:shuffleAnim 1.2s ease-in-out infinite;
  }
  .shuffle-cards .s-card img{width:100%;height:100%;object-fit:cover}
  .shuffle-cards .s-card:nth-child(1){animation-delay:0s}
  .shuffle-cards .s-card:nth-child(2){animation-delay:.15s}
  .shuffle-cards .s-card:nth-child(3){animation-delay:.3s}

  @keyframes shuffleAnim{
    0%  {transform:translate(0,0) rotate(0deg)}
    25% {transform:translate(25px,-8px) rotate(8deg)}
    50% {transform:translate(-25px,5px) rotate(-8deg)}
    75% {transform:translate(12px,-4px) rotate(4deg)}
    100%{transform:translate(0,0) rotate(0deg)}
  }

  /* ---------- BOTTOM BAR ---------- */
  #bottom-bar{
    max-width:960px;
    width:100%;
    padding:6px 16px 12px;
    display:flex;
    flex-direction:column;
    gap:6px;
    align-items:center;
  }

  /* Message */
  #message{
    text-align:center;
    font-size:.95rem;
    min-height:24px;
    color:#ffffffcc;
    padding:2px 0;
  }

  /* Controls */
  #controls{
    display:flex;
    gap:8px;
    justify-content:center;
    flex-wrap:wrap;
  }
  .btn{
    padding:7px 20px;
    border:2px solid var(--gold);
    background:rgba(0,0,0,.4);
    color:var(--gold);
    font-size:.85rem;font-weight:700;
    border-radius:8px;
    cursor:pointer;
    letter-spacing:1px;
    transition:all .15s;
  }
  .btn:hover:not(:disabled){
    background:var(--gold);
    color:#1a1a1a;
  }
  .btn:disabled{
    opacity:.3;cursor:not-allowed;
  }

  /* Chip tray + bet info */
  #chip-row{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    justify-content:center;
  }
  .chip{
    width:42px;height:42px;
    border-radius:50%;
    display:inline-flex;align-items:center;justify-content:center;
    font-weight:700;font-size:.65rem;
    cursor:grab;
    border:3px dashed rgba(255,255,255,.5);
    transition:transform .12s,box-shadow .12s;
    color:#fff;
    text-shadow:0 1px 2px rgba(0,0,0,.6);
  }
  .chip:hover{transform:scale(1.15);box-shadow:0 0 14px rgba(255,255,255,.3)}
  .chip:active{cursor:grabbing}
  .chip.c5{background:#cc3333}
  .chip.c10{background:#3366cc}
  .chip.c25{background:#22aa44}
  .chip.c50{background:#333}
  .chip.c100{background:#8844cc}

  #bet-info{
    font-size:.8rem;
    color:#ffffffaa;
    display:flex;gap:14px;
  }
  #bet-info strong{color:var(--gold)}

  /* ---------- DRAG GHOST ---------- */
  .drag-ghost{
    position:fixed;
    pointer-events:none;
    z-index:1000;
  }

  /* ---------- RESPONSIVE ---------- */
  @media(max-width:700px){
    :root{--card-w:60px;--card-h:87px}
    #table{padding-bottom:85%}
    .seat-left{left:-2%}
    .seat-right{right:-2%}
    .player-area{min-width:130px;padding:6px 8px}
    header{font-size:1.1rem}
    .btn{padding:6px 14px;font-size:.75rem}
    .chip{width:34px;height:34px;font-size:.55rem}
    #pot-area{width:56px;height:56px}
  }
</style>
</head>
<body>

<header>
  BLACKJACK
  <span>Drag chips to bet &bull; Drag cards to flip &bull; Draw from the deck</span>
</header>

<!-- Shuffle overlay -->
<div id="shuffle-overlay">
  <h2>SHUFFLING...</h2>
  <div class="shuffle-cards">
    <div class="s-card"><img src="cards/card_back.png" alt=""></div>
    <div class="s-card"><img src="cards/card_back.png" alt=""></div>
    <div class="s-card"><img src="cards/card_back.png" alt=""></div>
  </div>
</div>

<div id="table-container">
  <div id="table">
    <!-- Dealer seat: top -->
    <div class="seat seat-dealer">
      <div class="player-area" id="area-dealer">
        <div class="label"><span class="name">Dealer</span><span class="score" id="score-dealer">?</span><span class="status" id="status-dealer"></span></div>
        <div class="hand" id="hand-dealer"></div>
      </div>
    </div>

    <!-- Bot1 seat: left -->
    <div class="seat seat-left">
      <div class="player-area" id="area-bot1">
        <div class="label"><span class="name">Alice</span><span class="score" id="score-bot1">0</span><span class="status" id="status-bot1"></span></div>
        <div class="hand" id="hand-bot1"></div>
      </div>
    </div>

    <!-- Bot2 seat: right -->
    <div class="seat seat-right">
      <div class="player-area" id="area-bot2">
        <div class="label"><span class="name">Bob</span><span class="score" id="score-bot2">0</span><span class="status" id="status-bot2"></span></div>
        <div class="hand" id="hand-bot2"></div>
      </div>
    </div>

    <!-- Center: deck + pot -->
    <div id="table-center">
      <div id="deck-pile">
        <img src="cards/card_back.png" class="deck-card" style="top:0;left:0" alt="">
        <img src="cards/card_back.png" class="deck-card" style="top:-2px;left:1px" alt="">
        <img src="cards/card_back.png" class="deck-card" style="top:-4px;left:2px" alt="">
      </div>
      <div id="pot-area">
        <span id="pot-label"></span>
      </div>
    </div>

    <!-- Player seat: bottom -->
    <div class="seat seat-player">
      <div class="player-area" id="area-player">
        <div class="label"><span class="name">You</span><span class="score" id="score-player">0</span><span class="status" id="status-player"></span></div>
        <div class="hand" id="hand-player"></div>
      </div>
    </div>
  </div>
</div>

<div id="bottom-bar">
  <div id="message"></div>
  <div id="controls">
    <button class="btn" id="btn-hit" disabled>HIT</button>
    <button class="btn" id="btn-stand" disabled>STAND</button>
    <button class="btn" id="btn-double" disabled>DOUBLE</button>
    <button class="btn" id="btn-deal" disabled>DEAL</button>
    <button class="btn" id="btn-newround">NEW ROUND</button>
  </div>
  <div id="chip-row">
    <span class="chip c5" data-val="5">$5</span>
    <span class="chip c10" data-val="10">$10</span>
    <span class="chip c25" data-val="25">$25</span>
    <span class="chip c50" data-val="50">$50</span>
    <span class="chip c100" data-val="100">$100</span>
  </div>
  <div id="bet-info">
    <span>Bet: <strong id="current-bet">$0</strong></span>
    <span>Balance: <strong id="balance">$1000</strong></span>
  </div>
</div>

<script>
(function(){
  /* ===================== DECK ===================== */
  const SUITS=['clubs','diamonds','hearts','spades'];
  const RANKS=['A','02','03','04','05','06','07','08','09','10','J','Q','K'];

  function buildDeck(){
    const d=[];
    for(const s of SUITS)
      for(const r of RANKS)
        d.push({suit:s,rank:r,img:`cards/card_${s}_${r}.png`});
    return d;
  }

  function shuffleDeck(d){
    for(let i=d.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [d[i],d[j]]=[d[j],d[i]];
    }
    return d;
  }

  function cardValue(rank){
    if(rank==='A') return 11;
    if(['J','Q','K'].includes(rank)) return 10;
    return parseInt(rank,10);
  }

  function handScore(cards){
    let sum=0,aces=0;
    for(const c of cards){
      sum+=cardValue(c.rank);
      if(c.rank==='A') aces++;
    }
    while(sum>21&&aces>0){sum-=10;aces--;}
    return sum;
  }

  /* ===================== STATE ===================== */
  let deck=[];
  let balance=1000;
  let bet=0;
  let hitInProgress=false;

  const players={
    bot1:{name:'Alice',cards:[],el:'bot1',stand:false},
    bot2:{name:'Bob',cards:[],el:'bot2',stand:false},
    player:{name:'You',cards:[],el:'player',stand:false},
    dealer:{name:'Dealer',cards:[],el:'dealer',stand:false},
  };

  const order=['bot1','bot2','player','dealer'];
  const botKeys=['bot1','bot2'];

  /* ===================== DOM ===================== */
  const $=id=>document.getElementById(id);
  const btnHit=$('btn-hit'),btnStand=$('btn-stand'),btnDouble=$('btn-double'),
        btnDeal=$('btn-deal'),btnNew=$('btn-newround');
  const msgEl=$('message');
  const balEl=$('balance');
  const betEl=$('current-bet');
  const overlay=$('shuffle-overlay');
  const potArea=$('pot-area');
  const potLabel=$('pot-label');
  const deckPile=$('deck-pile');

  /* ===================== HELPERS ===================== */
  function msg(t){msgEl.textContent=t}
  function updateBalance(){balEl.textContent='$'+balance}
  function updateBet(){
    betEl.textContent='$'+bet;
    potLabel.textContent=bet>0?'$'+bet:'';
    if(bet>0) potArea.classList.add('has-chips');
    else potArea.classList.remove('has-chips');
  }

  function setScore(key){
    const p=players[key];
    const el=$('score-'+key);

    if(key==='player'){
      // only count flipped (visible) cards
      const handEl=$('hand-player');
      const slots=handEl.querySelectorAll('.card-slot');
      let vis=0,aces=0,hidden=0;
      slots.forEach((slot,i)=>{
        if(slot.querySelector('.card.flipped')){
          vis+=cardValue(p.cards[i].rank);
          if(p.cards[i].rank==='A') aces++;
        } else {
          hidden++;
        }
      });
      while(vis>21&&aces>0){vis-=10;aces--;}
      el.textContent=hidden>0?(vis>0?vis+'+?':'?'):handScore(p.cards);
      return;
    }

    if(key==='dealer'&&!p.stand&&p.cards.length===2){
      el.textContent=cardValue(p.cards[0].rank);
    } else {
      el.textContent=handScore(p.cards);
    }
  }

  function setStatus(key,text){$('status-'+key).textContent=text}

  function setAreaClass(key,cls){
    const el=$('area-'+key);
    el.className='player-area';
    if(cls) el.classList.add(cls);
  }

  function clearHand(key){
    $('hand-'+key).innerHTML='';
    $('score-'+key).textContent=key==='dealer'?'?':'0';
    $('status-'+key).textContent='';
    setAreaClass(key,'');
    players[key].cards=[];
    players[key].stand=false;
  }

  function clearPot(){
    potArea.querySelectorAll('.pot-chip').forEach(c=>c.remove());
    potArea.classList.remove('has-chips');
    potLabel.textContent='';
  }

  /* ===================== CARD RENDERING ===================== */
  function createCardEl(card,faceDown){
    const slot=document.createElement('div');
    slot.className='card-slot';
    const inner=document.createElement('div');
    inner.className='card'+(faceDown?'':' flipped');
    const back=document.createElement('div');
    back.className='card-face card-back';
    back.innerHTML=`<img src="cards/card_back.png" alt="back">`;
    const front=document.createElement('div');
    front.className='card-face card-front';
    front.innerHTML=`<img src="${card.img}" alt="${card.rank} ${card.suit}">`;
    inner.appendChild(back);
    inner.appendChild(front);
    slot.appendChild(inner);
    return slot;
  }

  function dealCardToHand(key,faceDown,delayMs){
    return new Promise(resolve=>{
      setTimeout(()=>{
        const card=deck.pop();
        players[key].cards.push(card);
        const el=createCardEl(card,faceDown);
        const handEl=$('hand-'+key);
        handEl.appendChild(el);

        // compute deal origin from deck center
        const deckRect=deckPile.getBoundingClientRect();
        const deckCX=deckRect.left+deckRect.width/2;
        const deckCY=deckRect.top+deckRect.height/2;

        requestAnimationFrame(()=>{
          const cardRect=el.getBoundingClientRect();
          const cardCX=cardRect.left+cardRect.width/2;
          const cardCY=cardRect.top+cardRect.height/2;
          const dx=deckCX-cardCX;
          const dy=deckCY-cardCY;
          el.style.setProperty('--deal-from',`translate(${dx}px,${dy}px) scale(0.6)`);
          el.classList.add('dealt');
        });

        if(!faceDown){
          setTimeout(()=>{el.querySelector('.card').classList.add('flipped')},200);
        }

        setScore(key);
        resolve(card);
      },delayMs);
    });
  }

  function flipCard(key,index){
    const slots=$('hand-'+key).querySelectorAll('.card-slot');
    if(slots[index]) slots[index].querySelector('.card').classList.add('flipped');
  }

  /* ===================== DRAG UTILITY ===================== */
  function makeDraggable(el,callbacks){
    el.addEventListener('mousedown',(e)=>{
      e.preventDefault();
      const startX=e.clientX,startY=e.clientY;
      let active=true;
      if(callbacks.onStart) callbacks.onStart(e,{x:startX,y:startY});

      const onMove=(e2)=>{
        if(!active) return;
        callbacks.onMove&&callbacks.onMove(e2,{dx:e2.clientX-startX,dy:e2.clientY-startY},{x:startX,y:startY});
      };
      const onUp=(e2)=>{
        if(!active) return;
        active=false;
        callbacks.onEnd&&callbacks.onEnd(e2,{dx:e2.clientX-startX,dy:e2.clientY-startY},{x:startX,y:startY});
        document.removeEventListener('mousemove',onMove);
        document.removeEventListener('mouseup',onUp);
      };
      document.addEventListener('mousemove',onMove);
      document.addEventListener('mouseup',onUp);
    });
  }

  function isInRect(x,y,rect,pad=0){
    return x>=rect.left-pad&&x<=rect.right+pad&&y>=rect.top-pad&&y<=rect.bottom+pad;
  }

  /* ===================== CARD FLIP DRAG (player) ===================== */
  function attachFlipDrag(cardSlot){
    const cardInner=cardSlot.querySelector('.card');
    let flipped=false;

    makeDraggable(cardSlot,{
      onStart(){
        if(flipped) return;
        cardInner.style.transition='none';
      },
      onMove(e,delta){
        if(flipped) return;
        const progress=Math.min(Math.abs(delta.dx)/120,1);
        const angle=progress*180;
        cardInner.style.transform=`rotateY(${angle}deg)`;
      },
      onEnd(e,delta){
        if(flipped) return;
        const progress=Math.abs(delta.dx)/120;
        if(progress>=0.4){
          // snap to flipped
          cardInner.style.transition='transform .25s ease';
          cardInner.classList.add('flipped');
          cardInner.style.transform='';
          flipped=true;
          cardSlot.removeAttribute('data-flippable');
          setScore('player');
          onPlayerCardFlipped();
        } else {
          // snap back
          cardInner.style.transition='transform .25s ease';
          cardInner.style.transform='rotateY(0deg)';
          setTimeout(()=>{cardInner.style.transition='none'},250);
        }
      }
    });
  }

  function onPlayerCardFlipped(){
    const unflipped=$('hand-player').querySelectorAll('.card-slot[data-flippable="true"]');
    if(unflipped.length>0) return;

    if(gamePhase==='player-flip'){
      // all initial cards flipped, check naturals then go to player-turn
      proceedAfterFlip();
    } else if(gamePhase==='player-flip-hit'){
      // hit card flipped, evaluate
      onHitCardFlipped();
    } else if(gamePhase==='player-flip-double'){
      onDoubleCardFlipped();
    }
  }

  /* ===================== DECK DRAG (draw card) ===================== */
  function setupDeckDrag(){
    let ghost=null;
    makeDraggable(deckPile,{
      onStart(e){
        if(gamePhase!=='player-turn'||hitInProgress) return;
        deckPile.classList.add('active-drag');
        ghost=document.createElement('div');
        ghost.className='drag-ghost';
        ghost.innerHTML=`<img src="cards/card_back.png" style="width:var(--card-w);height:var(--card-h);border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.6);">`;
        ghost.style.left=e.clientX+'px';
        ghost.style.top=e.clientY+'px';
        ghost.style.transform='translate(-50%,-50%) rotate(-5deg) scale(1.05)';
        document.body.appendChild(ghost);
      },
      onMove(e){
        if(!ghost) return;
        ghost.style.left=e.clientX+'px';
        ghost.style.top=e.clientY+'px';
        const r=$('hand-player').getBoundingClientRect();
        const pr=$('area-player').getBoundingClientRect();
        if(isInRect(e.clientX,e.clientY,pr,30)){
          $('hand-player').classList.add('drop-target');
        } else {
          $('hand-player').classList.remove('drop-target');
        }
      },
      onEnd(e){
        deckPile.classList.remove('active-drag');
        if(ghost){ghost.remove();ghost=null;}
        $('hand-player').classList.remove('drop-target');
        if(gamePhase!=='player-turn'||hitInProgress) return;
        const pr=$('area-player').getBoundingClientRect();
        if(isInRect(e.clientX,e.clientY,pr,40)){
          performHit();
        }
      }
    });
  }

  /* ===================== CHIP DRAG ===================== */
  function setupChipDrag(){
    document.querySelectorAll('#chip-row .chip').forEach(chip=>{
      // click fallback
      chip.addEventListener('click',()=>{
        if(gamePhase!=='betting') return;
        const v=parseInt(chip.dataset.val);
        if(bet+v>balance) return;
        bet+=v;
        addChipToPot(v);
        updateBet();
        btnDeal.disabled=(bet===0);
      });

      // drag
      let ghost=null;
      let didDrag=false;
      makeDraggable(chip,{
        onStart(e){
          if(gamePhase!=='betting') return;
          const v=parseInt(chip.dataset.val);
          if(bet+v>balance) return;
          didDrag=false;
          ghost=chip.cloneNode(true);
          ghost.className='drag-ghost chip '+chip.className.split(' ').filter(c=>c.startsWith('c')).join(' ');
          ghost.style.width='42px';ghost.style.height='42px';
          ghost.style.borderRadius='50%';
          ghost.style.display='flex';ghost.style.alignItems='center';ghost.style.justifyContent='center';
          ghost.style.left=e.clientX+'px';ghost.style.top=e.clientY+'px';
          ghost.style.transform='translate(-50%,-50%) scale(1.2)';
          ghost.style.border='3px dashed rgba(255,255,255,.5)';
          ghost.style.fontWeight='700';ghost.style.fontSize='.65rem';ghost.style.color='#fff';
          ghost.style.textShadow='0 1px 2px rgba(0,0,0,.6)';
          document.body.appendChild(ghost);
        },
        onMove(e){
          if(!ghost) return;
          didDrag=true;
          ghost.style.left=e.clientX+'px';
          ghost.style.top=e.clientY+'px';
          const r=potArea.getBoundingClientRect();
          if(isInRect(e.clientX,e.clientY,r,35)){
            potArea.classList.add('drag-over');
          } else {
            potArea.classList.remove('drag-over');
          }
        },
        onEnd(e){
          potArea.classList.remove('drag-over');
          if(ghost){ghost.remove();ghost=null;}
          if(!didDrag||gamePhase!=='betting') return;
          const v=parseInt(chip.dataset.val);
          if(bet+v>balance) return;
          const r=potArea.getBoundingClientRect();
          if(isInRect(e.clientX,e.clientY,r,35)){
            bet+=v;
            addChipToPot(v);
            updateBet();
            btnDeal.disabled=(bet===0);
          }
        }
      });
    });
  }

  function addChipToPot(val){
    const chipEl=document.createElement('div');
    chipEl.className=`pot-chip c${val}`;
    const n=potArea.querySelectorAll('.pot-chip').length;
    const ox=(Math.random()-.5)*14;
    const oy=-n*3;
    chipEl.style.transform=`translate(${ox}px,${oy}px)`;
    chipEl.textContent='$'+val;
    potArea.appendChild(chipEl);
  }

  /* ===================== HOVER FAN (opponents) ===================== */
  function setupHoverFan(){
    for(const key of ['bot1','bot2','dealer']){
      const handEl=$('hand-'+key);
      handEl.addEventListener('mouseenter',()=>{
        const cards=handEl.querySelectorAll('.card-slot');
        if(cards.length<=1) return;
        cards.forEach((c,i)=>{
          c.style.setProperty('--fi',i);
          c.style.setProperty('--fc',cards.length);
          const center=(cards.length-1)/2;
          const angle=(i-center)*10;
          const lift=-12;
          const spread=(i-center)*8;
          c.style.transition='transform .3s ease';
          c.style.transformOrigin='bottom center';
          c.style.transform=`rotate(${angle}deg) translateY(${lift}px) translateX(${spread}px)`;
          c.style.zIndex=i;
        });
        handEl.classList.add('fanned');
      });
      handEl.addEventListener('mouseleave',()=>{
        handEl.classList.remove('fanned');
        const cards=handEl.querySelectorAll('.card-slot');
        cards.forEach(c=>{
          c.style.transition='transform .3s ease';
          c.style.transform='';
          c.style.zIndex='';
          setTimeout(()=>{c.style.transition='transform .2s ease, z-index 0s'},300);
        });
      });
    }
  }

  /* ===================== SHUFFLE ANIMATION ===================== */
  function showShuffle(){
    return new Promise(resolve=>{
      overlay.classList.add('visible');
      setTimeout(()=>{
        overlay.classList.remove('visible');
        resolve();
      },1600);
    });
  }

  /* ===================== GAME PHASES ===================== */
  let gamePhase='idle';

  function enablePlayerBtns(canDouble){
    btnHit.disabled=false;
    btnStand.disabled=false;
    btnDouble.disabled=!canDouble;
  }
  function disablePlayerBtns(){
    btnHit.disabled=true;
    btnStand.disabled=true;
    btnDouble.disabled=true;
  }

  /* ---- NEW ROUND ---- */
  btnNew.addEventListener('click',async()=>{
    if(balance<=0){balance=1000;updateBalance();}
    bet=0;updateBet();
    clearPot();
    for(const k of order) clearHand(k);
    msg('Place your bet: drag chips to the pot or click them, then press DEAL');
    gamePhase='betting';
    btnNew.disabled=true;
    btnDeal.disabled=true;
    disablePlayerBtns();
  });

  /* ---- DEAL ---- */
  btnDeal.addEventListener('click',async()=>{
    if(gamePhase!=='betting'||bet===0) return;
    btnDeal.disabled=true;
    btnNew.disabled=true;
    gamePhase='dealing';

    deck=shuffleDeck(buildDeck());
    await showShuffle();

    msg('Dealing cards...');

    const dealDelay=220;
    for(let round=0;round<2;round++){
      for(const k of order){
        // player cards face-down (they'll flip manually), dealer hole card face-down
        const faceDown=(k==='player')||(k==='dealer'&&round===1);
        await dealCardToHand(k,faceDown,dealDelay);
      }
    }

    // Attach flip drag to player's cards
    const playerSlots=$('hand-player').querySelectorAll('.card-slot');
    playerSlots.forEach(slot=>{
      slot.setAttribute('data-flippable','true');
      attachFlipDrag(slot);
    });

    // Bots play first
    gamePhase='bots-play';
    await botsPlay();

    // Now wait for player to flip their cards
    gamePhase='player-flip';
    setAreaClass('player','active-turn');
    msg('Drag your cards sideways to flip them');
  });

  function proceedAfterFlip(){
    const pScore=handScore(players.player.cards);
    const dScore=handScore(players.dealer.cards);

    if(pScore===21&&dScore===21){
      revealDealer();
      msg('Both Blackjack! Push.');
      setStatus('player','PUSH');setStatus('dealer','BLACKJACK');
      setAreaClass('player','push');setAreaClass('dealer','blackjack');
      endRound('push');
      return;
    }
    if(pScore===21){
      revealDealer();
      msg('Blackjack! You win 3:2!');
      setStatus('player','BLACKJACK');
      setAreaClass('player','blackjack');
      endRound('blackjack');
      return;
    }

    // normal player turn
    gamePhase='player-turn';
    msg('Your turn: Hit, Stand, or Double. Drag from the deck or use buttons.');
    const canDouble=(players.player.cards.length===2&&bet*2<=balance+bet);
    enablePlayerBtns(canDouble);
  }

  /* ---- PLAYER ACTIONS ---- */
  async function performHit(){
    if(hitInProgress) return;
    hitInProgress=true;
    disablePlayerBtns();

    await dealCardToHand('player',true,0);
    const slots=$('hand-player').querySelectorAll('.card-slot');
    const newSlot=slots[slots.length-1];
    newSlot.setAttribute('data-flippable','true');
    attachFlipDrag(newSlot);

    gamePhase='player-flip-hit';
    msg('Flip your new card');
  }

  function onHitCardFlipped(){
    hitInProgress=false;
    const s=handScore(players.player.cards);
    if(s>21){
      setStatus('player','BUST');
      setAreaClass('player','bust');
      msg('You bust!');
      players.player.stand=true;
      dealerPlay().then(()=>resolveRound());
    } else if(s===21){
      players.player.stand=true;
      setAreaClass('player','');
      dealerPlay().then(()=>resolveRound());
    } else {
      gamePhase='player-turn';
      msg('Your turn: Hit, Stand, or Double.');
      enablePlayerBtns(false);
    }
  }

  function onDoubleCardFlipped(){
    hitInProgress=false;
    const s=handScore(players.player.cards);
    players.player.stand=true;
    if(s>21){
      setStatus('player','BUST');
      setAreaClass('player','bust');
      msg('You bust on double!');
    } else {
      msg('Doubled down.');
    }
    setAreaClass('player','');
    dealerPlay().then(()=>resolveRound());
  }

  btnHit.addEventListener('click',()=>{
    if(gamePhase!=='player-turn') return;
    performHit();
  });

  btnStand.addEventListener('click',async()=>{
    if(gamePhase!=='player-turn') return;
    disablePlayerBtns();
    players.player.stand=true;
    setAreaClass('player','');
    msg('You stand.');
    await dealerPlay();
    resolveRound();
  });

  btnDouble.addEventListener('click',async()=>{
    if(gamePhase!=='player-turn') return;
    disablePlayerBtns();
    hitInProgress=true;
    bet*=2;updateBet();

    await dealCardToHand('player',true,0);
    const slots=$('hand-player').querySelectorAll('.card-slot');
    const newSlot=slots[slots.length-1];
    newSlot.setAttribute('data-flippable','true');
    attachFlipDrag(newSlot);

    gamePhase='player-flip-double';
    msg('Flip your double-down card');
  });

  /* ===================== BOT AI ===================== */
  async function botsPlay(){
    for(const bk of botKeys){
      setAreaClass(bk,'active-turn');
      await sleep(400);

      while(true){
        const s=handScore(players[bk].cards);
        if(s>=21) break;
        const hasAce=players[bk].cards.some(c=>c.rank==='A');
        const rawSum=players[bk].cards.reduce((a,c)=>a+cardValue(c.rank),0);
        const isSoft17=(s===17&&hasAce&&rawSum!==17);

        if(s<17||isSoft17){
          await dealCardToHand(bk,false,300);
          const slots=$('hand-'+bk).querySelectorAll('.card-slot');
          slots[slots.length-1].querySelector('.card').classList.add('flipped');
          await sleep(400);
        } else {
          break;
        }
      }

      const finalScore=handScore(players[bk].cards);
      players[bk].stand=true;
      if(finalScore>21){
        setStatus(bk,'BUST');
        setAreaClass(bk,'bust');
      } else {
        setStatus(bk,'Stand ('+finalScore+')');
        setAreaClass(bk,'');
      }
    }
  }

  /* ===================== DEALER ===================== */
  function revealDealer(){
    flipCard('dealer',1);
    $('score-dealer').textContent=handScore(players.dealer.cards);
  }

  async function dealerPlay(){
    gamePhase='dealer-play';
    revealDealer();
    setAreaClass('dealer','active-turn');
    await sleep(500);

    while(handScore(players.dealer.cards)<17){
      await dealCardToHand('dealer',false,400);
      const slots=$('hand-dealer').querySelectorAll('.card-slot');
      slots[slots.length-1].querySelector('.card').classList.add('flipped');
      setScore('dealer');
      await sleep(500);
    }

    players.dealer.stand=true;
    const ds=handScore(players.dealer.cards);
    if(ds>21){
      setStatus('dealer','BUST');
      setAreaClass('dealer','bust');
    } else {
      setStatus('dealer','Stand ('+ds+')');
      setAreaClass('dealer','');
    }
  }

  /* ===================== RESOLVE ===================== */
  function resolveRound(){
    gamePhase='result';
    const ds=handScore(players.dealer.cards);
    const dBust=ds>21;

    for(const bk of botKeys){
      const bs=handScore(players[bk].cards);
      if(bs>21){setAreaClass(bk,'bust');}
      else if(dBust||bs>ds){setStatus(bk,'WIN');setAreaClass(bk,'win');}
      else if(bs===ds){setStatus(bk,'PUSH');setAreaClass(bk,'push');}
      else{setStatus(bk,'LOSE');setAreaClass(bk,'lose');}
    }

    const ps=handScore(players.player.cards);
    if(ps>21){
      balance-=bet;
      msg('You bust! Lost $'+bet);
      setAreaClass('player','bust');
      setStatus('player','BUST  -$'+bet);
    } else if(dBust||ps>ds){
      balance+=bet;
      msg('You win $'+bet+'!');
      setAreaClass('player','win');
      setStatus('player','WIN  +$'+bet);
    } else if(ps===ds){
      msg('Push. Bet returned.');
      setAreaClass('player','push');
      setStatus('player','PUSH');
    } else {
      balance-=bet;
      msg('Dealer wins. Lost $'+bet);
      setAreaClass('player','lose');
      setStatus('player','LOSE  -$'+bet);
    }

    updateBalance();
    btnNew.disabled=false;
    if(balance<=0) msg('Out of chips! Press NEW ROUND to reset.');
  }

  function endRound(type){
    gamePhase='result';
    if(type==='blackjack'){
      balance+=Math.floor(bet*1.5);
      setStatus('player','BLACKJACK  +$'+Math.floor(bet*1.5));
    }
    const ds=handScore(players.dealer.cards);
    const dBust=ds>21;
    for(const bk of botKeys){
      const bs=handScore(players[bk].cards);
      if(bs>21){setAreaClass(bk,'bust');}
      else if(dBust||bs>ds){setStatus(bk,'WIN');setAreaClass(bk,'win');}
      else if(bs===ds){setStatus(bk,'PUSH');setAreaClass(bk,'push');}
      else{setStatus(bk,'LOSE');setAreaClass(bk,'lose');}
    }
    updateBalance();
    btnNew.disabled=false;
  }

  /* ===================== UTIL ===================== */
  function sleep(ms){return new Promise(r=>setTimeout(r,ms))}

  /* ===================== INIT ===================== */
  setupDeckDrag();
  setupChipDrag();
  setupHoverFan();
  msg('Press NEW ROUND to start');
  gamePhase='idle';
  updateBalance();
})();
</script>
</body>
</html>
