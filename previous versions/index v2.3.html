<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Blackjack</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --card-w:min(72px,13vw);
  --card-h:calc(var(--card-w)*1.45);
  --felt:#0b6623;
  --gold:#d4a844;
  --chip-sz:min(40px,8.5vw);
  --rim-h:clamp(38px,6vh,52px);
}

html,body{
  height:100vh;height:100dvh;
  width:100vw;
  overflow:hidden;
  font-family:'Segoe UI',system-ui,sans-serif;
  color:#fff;
  user-select:none;
  -webkit-user-select:none;
  touch-action:manipulation;
  -webkit-touch-callout:none;
  background:#111;
}

/* ===== GAME FRAME ===== */
#game-frame{
  position:relative;
  width:100%;height:100vh;height:100dvh;
  max-width:600px;
  margin:0 auto;
  overflow:hidden;
  background:radial-gradient(ellipse at 50% 42%,#0f8a30 0%,#0b6623 40%,#07521a 75%,#053f14 100%);
}

/* ===== WOOD RIM ===== */
#wood-rim{
  position:absolute;
  bottom:0;left:0;right:0;
  height:var(--rim-h);
  background:linear-gradient(to bottom,#6b4226 0%,#5c3a1e 40%,#4a2e15 100%);
  border-top:3px solid #3a2210;
  box-shadow:inset 0 3px 10px rgba(0,0,0,.35);
  z-index:0;
}

/* ===== SEATS ===== */
.seat{position:absolute;display:flex;justify-content:center;z-index:2}

.seat-dealer{top:1%;left:50%;transform:translateX(-50%)}
.seat-left{top:24%;left:1%;transform:translateY(-50%)}
.seat-right{top:24%;right:1%;transform:translateY(-50%)}
.seat-player{
  bottom:calc(var(--rim-h) + 6px);
  left:50%;transform:translateX(-50%);
  z-index:4;
}

/* ===== PLAYER AREA ===== */
.player-area{
  position:relative;text-align:center;
  padding:3px 6px;border-radius:8px;
  transition:box-shadow .3s;
  background:rgba(0,0,0,.08);
}
.player-area.active-turn{
  box-shadow:0 0 0 2px var(--gold),0 0 14px rgba(212,168,68,.45);
}
.player-area.bust .label .status{color:#ff5555}
.player-area.blackjack .label .status{color:#ffd700}
.player-area.win .label .status{color:#55ff55}
.player-area.lose .label .status{color:#ff5555}
.player-area.push .label .status{color:#aaaaff}

.label{
  display:flex;align-items:center;gap:4px;
  justify-content:center;font-size:min(.7rem,2.2vw);
  margin-bottom:2px;white-space:nowrap;
}
.label .name{font-weight:700;color:var(--gold)}
.label .score{
  background:rgba(0,0,0,.5);padding:2px 8px;
  border-radius:10px;font-size:min(.8rem,2.8vw);
  font-weight:700;letter-spacing:.5px;
  border:1px solid rgba(255,255,255,.15);
}
.label .status{font-weight:600;font-size:min(.65rem,2vw)}

.hand{
  display:flex;gap:4px;justify-content:center;
  min-height:calc(var(--card-h) + 2px);
  align-items:flex-start;position:relative;
}
.hand.drop-target{box-shadow:0 0 18px rgba(212,168,68,.5);border-radius:8px}

/* side seat hands stack tighter — overlap after 3 cards */
.seat-left .hand,.seat-right .hand{gap:0;flex-wrap:nowrap}
.seat-left .hand .card-slot,.seat-right .hand .card-slot{
  width:calc(var(--card-w)*.62);height:calc(var(--card-h)*.62);
  margin-right:-8px;
}
.seat-left .hand .card-slot:last-child,.seat-right .hand .card-slot:last-child{margin-right:0}

/* ===== CARDS ===== */
.card-slot{
  width:var(--card-w);height:var(--card-h);
  perspective:800px;flex-shrink:0;position:relative;
  opacity:0;animation:none;
}
.card-slot.dealt{animation:dealIn .4s ease forwards}
@keyframes dealIn{
  0%{opacity:0;transform:var(--deal-from,translateY(-30px) scale(.6))}
  70%{opacity:1;transform:scale(1.03)}
  100%{opacity:1;transform:scale(1)}
}

.card{
  width:100%;height:100%;position:relative;
  transform-style:preserve-3d;transition:transform .45s ease;
  border-radius:6px;
}
.card.flipped{transform:rotateY(180deg)}

.card-face{
  position:absolute;width:100%;height:100%;
  backface-visibility:hidden;border-radius:6px;
  overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,.4);
}
.card-face img{width:100%;height:100%;object-fit:cover;display:block}
.card-front{transform:rotateY(180deg)}

/* flippable hint */
.card-slot[data-flippable="true"]{cursor:grab;touch-action:none}
.card-slot[data-flippable="true"]::after{
  content:'';position:absolute;top:0;right:-2px;bottom:0;width:14px;
  background:linear-gradient(to left,rgba(212,168,68,.45),transparent);
  border-radius:0 6px 6px 0;pointer-events:none;
  animation:flipHint 1.4s ease-in-out infinite;
}
@keyframes flipHint{
  0%,100%{opacity:.35;transform:translateX(0)}
  50%{opacity:.9;transform:translateX(2px)}
}

/* ===== TABLE CENTER ===== */
#table-center{
  position:absolute;top:43%;left:50%;
  transform:translate(-50%,-50%);
  display:flex;flex-direction:column;align-items:center;gap:6px;
  z-index:1;
}
#deck-pile{
  position:relative;
  width:var(--card-w);height:var(--card-h);
  cursor:grab;touch-action:none;transition:transform .15s;
}
#deck-pile.active-drag{transform:scale(.92)}
.deck-card{
  position:absolute;width:100%;height:100%;
  border-radius:6px;box-shadow:0 2px 6px rgba(0,0,0,.4);object-fit:cover;
}
.deck-card.shuffling{animation:deckShuffle .32s ease-in-out infinite alternate}
.deck-card.shuffling:nth-child(1){animation-delay:0s}
.deck-card.shuffling:nth-child(2){animation-delay:.05s;animation-name:deckShuffleAlt}
.deck-card.shuffling:nth-child(3){animation-delay:.10s}
.deck-card.shuffling:nth-child(4){animation-delay:.15s;animation-name:deckShuffleAlt}
.deck-card.shuffling:nth-child(5){animation-delay:.20s}
@keyframes deckShuffle{
  0%{transform:translateX(-20px) rotate(-8deg)}
  100%{transform:translateX(20px) rotate(8deg)}
}
@keyframes deckShuffleAlt{
  0%{transform:translate(-14px,-6px) rotate(-5deg) scale(1.03)}
  100%{transform:translate(14px,6px) rotate(5deg) scale(.97)}
}

#pot-area{
  width:min(60px,10vw);height:min(60px,10vw);
  border-radius:50%;border:2px dashed transparent;
  display:flex;align-items:center;justify-content:center;
  position:relative;transition:all .2s;
}
#pot-area.has-chips{border-color:transparent}
#pot-area.drag-over{
  border-color:var(--gold);background:rgba(212,168,68,.15);
  box-shadow:0 0 20px rgba(212,168,68,.35);transform:scale(1.12);
}
.pot-chip{
  position:absolute;width:22px;height:22px;border-radius:50%;
  border:2px dashed rgba(255,255,255,.4);
  display:flex;align-items:center;justify-content:center;
  font-size:.4rem;font-weight:700;color:#fff;
  text-shadow:0 1px 2px rgba(0,0,0,.6);pointer-events:none;
}
#pot-label{
  position:absolute;bottom:-14px;font-size:min(.65rem,2vw);
  color:var(--gold);font-weight:700;white-space:nowrap;
}

/* ===== MESSAGE ===== */
#message{
  position:absolute;top:20%;left:50%;transform:translateX(-50%);
  text-align:center;font-size:min(.9rem,3.2vw);
  color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.6);
  z-index:10;pointer-events:none;max-width:85%;
  white-space:nowrap;
  background:rgba(0,0,0,.5);padding:8px 18px;border-radius:10px;
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
}
#message:empty{background:none;padding:0}

/* ===== BUTTONS ===== */
#btn-group{
  position:absolute;
  bottom:calc(var(--rim-h) + 8px);
  left:10px;
  display:flex;flex-direction:column;gap:6px;
  z-index:20;
}
.btn{
  padding:9px 16px;
  border:2px solid rgba(255,255,255,.6);
  background:rgba(0,0,0,.55);
  color:#fff;font-size:min(.8rem,2.8vw);font-weight:700;
  border-radius:8px;cursor:pointer;letter-spacing:1px;
  transition:all .15s;min-width:min(90px,22vw);
  text-align:center;touch-action:manipulation;
  display:none;
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
}
.btn:active:not(:disabled){background:rgba(255,255,255,.2)}
.btn:disabled{opacity:.25;pointer-events:none}
.btn.glow{
  animation:btnGlow 1.1s ease-in-out infinite;
  border-color:#ffd700;
  background:rgba(40,30,0,.65);
}
@keyframes btnGlow{
  0%,100%{box-shadow:0 0 8px rgba(255,215,0,.4)}
  50%{box-shadow:0 0 22px rgba(255,215,0,.8)}
}

/* ===== CHIPS ===== */
#chips-right{
  position:absolute;display:flex;flex-direction:column;gap:4px;z-index:20;
  bottom:calc(var(--rim-h) + 8px);
  right:10px;
}
.chip-stack{
  position:relative;width:var(--chip-sz);height:calc(var(--chip-sz) + 4px);
}
.chip-shadow{
  position:absolute;width:var(--chip-sz);height:var(--chip-sz);
  border-radius:50%;border:2px dashed rgba(255,255,255,.25);
  pointer-events:none;
}
.chip-shadow:first-child{top:4px;left:1px;opacity:.35;filter:brightness(.7)}
.chip-shadow:nth-child(2){top:2px;left:0;opacity:.55;filter:brightness(.85)}
.chip{
  position:relative;z-index:1;
  width:var(--chip-sz);height:var(--chip-sz);
  border-radius:50%;
  display:inline-flex;align-items:center;justify-content:center;
  font-weight:700;font-size:min(.55rem,1.8vw);
  cursor:grab;touch-action:none;
  border:3px dashed rgba(255,255,255,.5);
  color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.6);
  transition:transform .1s;
  box-shadow:0 1px 4px rgba(0,0,0,.4);
}
.chip:active{transform:scale(1.15)}
.c5{background:#cc3333}
.c10{background:#3366cc}
.c25{background:#22aa44}
.c50{background:#333}
.c100{background:#8844cc}

/* ===== BET INFO ===== */
#bet-info{
  position:absolute;bottom:calc(var(--rim-h)/2);left:50%;
  transform:translate(-50%,50%);
  font-size:min(.8rem,2.8vw);color:rgba(255,255,255,.9);
  display:flex;gap:14px;z-index:21;white-space:nowrap;
  font-weight:600;
  text-shadow:0 1px 3px rgba(0,0,0,.6);
}
#bet-info strong{color:var(--gold);font-size:min(.85rem,3vw)}

/* ===== BALANCE POPUP ===== */
.balance-popup{
  position:absolute;pointer-events:none;z-index:30;
  font-weight:900;font-size:min(1.1rem,4vw);
  text-shadow:0 2px 6px rgba(0,0,0,.7);
  animation:balPop .9s ease-out forwards;
  white-space:nowrap;
}
.balance-popup.win{color:#55ff55}
.balance-popup.lose{color:#ff5555}
@keyframes balPop{
  0%{opacity:1;transform:translateY(0) scale(1)}
  60%{opacity:1;transform:translateY(-28px) scale(1.15)}
  100%{opacity:0;transform:translateY(-48px) scale(.9)}
}

/* ===== DRAG GHOST ===== */
.drag-ghost{position:fixed;pointer-events:none;z-index:1000}

/* ===== RESPONSIVE ===== */
@media(max-height:580px){
  :root{--card-w:min(54px,11vw);--chip-sz:min(32px,7vw);--rim-h:clamp(30px,5vh,38px)}
  .btn{padding:6px 10px;font-size:min(.65rem,2.4vw);min-width:min(70px,18vw)}
  .seat-left,.seat-right{top:22%}
  .chip-stack{height:calc(var(--chip-sz) + 3px)}
  #chips-right{gap:2px}
}
@media(min-aspect-ratio:5/4){
  #game-frame{max-width:480px}
}
</style>
</head>
<body>
<div id="game-frame">

  <!-- Dealer -->
  <div class="seat seat-dealer">
    <div class="player-area" id="area-dealer">
      <div class="label"><span class="name">Dealer</span><span class="score" id="score-dealer">?</span><span class="status" id="status-dealer"></span></div>
      <div class="hand" id="hand-dealer"></div>
    </div>
  </div>

  <!-- Alice (left) -->
  <div class="seat seat-left">
    <div class="player-area" id="area-bot1">
      <div class="label"><span class="name">Alice</span><span class="score" id="score-bot1">0</span><span class="status" id="status-bot1"></span></div>
      <div class="hand" id="hand-bot1"></div>
    </div>
  </div>

  <!-- Bob (right) -->
  <div class="seat seat-right">
    <div class="player-area" id="area-bot2">
      <div class="label"><span class="name">Bob</span><span class="score" id="score-bot2">0</span><span class="status" id="status-bot2"></span></div>
      <div class="hand" id="hand-bot2"></div>
    </div>
  </div>

  <!-- Center deck + pot -->
  <div id="table-center">
    <div id="deck-pile">
      <img src="cards/card_back.png" class="deck-card" style="top:0;left:0" alt="">
      <img src="cards/card_back.png" class="deck-card" style="top:-2px;left:1px" alt="">
      <img src="cards/card_back.png" class="deck-card" style="top:-4px;left:2px" alt="">
      <img src="cards/card_back.png" class="deck-card" style="top:-6px;left:1px" alt="">
      <img src="cards/card_back.png" class="deck-card" style="top:-8px;left:2px" alt="">
    </div>
    <div id="pot-area"><span id="pot-label"></span></div>
  </div>

  <!-- Player -->
  <div class="seat seat-player">
    <div class="player-area" id="area-player">
      <div class="label"><span class="name">You</span><span class="score" id="score-player">0</span><span class="status" id="status-player"></span></div>
      <div class="hand" id="hand-player"></div>
    </div>
  </div>

  <!-- Message -->
  <div id="message"></div>

  <!-- Buttons -->
  <div id="btn-group">
    <button class="btn" id="btn-top">DEAL</button>
    <button class="btn" id="btn-bottom">NEW ROUND</button>
  </div>

  <!-- Chips (all right side, stacked) -->
  <div id="chips-right">
    <div class="chip-stack"><span class="chip-shadow c5"></span><span class="chip-shadow c5"></span><span class="chip c5" data-val="5">$5</span></div>
    <div class="chip-stack"><span class="chip-shadow c10"></span><span class="chip-shadow c10"></span><span class="chip c10" data-val="10">$10</span></div>
    <div class="chip-stack"><span class="chip-shadow c25"></span><span class="chip-shadow c25"></span><span class="chip c25" data-val="25">$25</span></div>
    <div class="chip-stack"><span class="chip-shadow c50"></span><span class="chip-shadow c50"></span><span class="chip c50" data-val="50">$50</span></div>
    <div class="chip-stack"><span class="chip-shadow c100"></span><span class="chip-shadow c100"></span><span class="chip c100" data-val="100">$100</span></div>
  </div>

  <!-- Bet info -->
  <div id="bet-info">
    <span>Bet: <strong id="current-bet">$0</strong></span>
    <span>Balance: <strong id="balance">$1000</strong></span>
  </div>

  <!-- Wood rim -->
  <div id="wood-rim"></div>
</div>

<script>
(function(){
  /* ===================== AUDIO ===================== */
  const AudioMgr=(()=>{
    const flips=[
      new Audio('audio/card_flip_1.ogg'),
      new Audio('audio/card_flip_2.ogg'),
      new Audio('audio/card_flip_3.ogg'),
      new Audio('audio/card_flip_4.ogg'),
    ];
    const shuffle=new Audio('audio/card_suffle.ogg');
    const chipDrop=new Audio('audio/chip_drop.ogg');
    const sfxClick=new Audio('audio/sfx_click.ogg');
    flips.forEach(a=>a.load());
    shuffle.load();chipDrop.load();sfxClick.load();

    function playFlip(){
      const s=flips[Math.floor(Math.random()*flips.length)];
      const c=s.cloneNode();
      c.volume=s.volume;
      c.play().catch(()=>{});
    }
    function playShuffle(){
      shuffle.currentTime=0;
      shuffle.play().catch(()=>{});
    }
    function playChipDrop(){
      const c=chipDrop.cloneNode();c.volume=chipDrop.volume;
      c.play().catch(()=>{});
    }
    function playClick(){
      const c=sfxClick.cloneNode();c.volume=sfxClick.volume;
      c.play().catch(()=>{});
    }
    return{playFlip,playShuffle,playChipDrop,playClick};
  })();

  /* ===================== DECK ===================== */
  const SUITS=['clubs','diamonds','hearts','spades'];
  const RANKS=['A','02','03','04','05','06','07','08','09','10','J','Q','K'];

  function buildDeck(){
    const d=[];
    for(const s of SUITS)for(const r of RANKS)
      d.push({suit:s,rank:r,img:`cards/card_${s}_${r}.png`});
    return d;
  }
  function shuffleDeck(d){
    for(let i=d.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [d[i],d[j]]=[d[j],d[i]];
    }
    return d;
  }
  function cardValue(r){
    if(r==='A')return 11;
    if('JQK'.includes(r))return 10;
    return parseInt(r,10);
  }
  function handScore(cards){
    let sum=0,aces=0;
    for(const c of cards){sum+=cardValue(c.rank);if(c.rank==='A')aces++;}
    while(sum>21&&aces>0){sum-=10;aces--;}
    return sum;
  }

  /* ===================== STATE ===================== */
  let deck=[],balance=1000,bet=0,hitInProgress=false;
  const players={
    bot1:{name:'Alice',cards:[],el:'bot1',stand:false},
    bot2:{name:'Bob',cards:[],el:'bot2',stand:false},
    player:{name:'You',cards:[],el:'player',stand:false},
    dealer:{name:'Dealer',cards:[],el:'dealer',stand:false},
  };
  const order=['bot1','bot2','player','dealer'];
  const botKeys=['bot1','bot2'];

  /* ===================== DOM ===================== */
  const $=id=>document.getElementById(id);
  const btnTop=$('btn-top'),btnBottom=$('btn-bottom');
  const msgEl=$('message'),balEl=$('balance'),betEl=$('current-bet');
  const potArea=$('pot-area'),potLabel=$('pot-label'),deckPile=$('deck-pile');

  /* ===================== HELPERS ===================== */
  function msg(t){msgEl.textContent=t}
  function updateBalance(){balEl.textContent='$'+balance}
  function updateBet(){
    betEl.textContent='$'+bet;
    potLabel.textContent=bet>0?'$'+bet:'';
    potArea.classList.toggle('has-chips',bet>0);
  }

  function setScore(key){
    const p=players[key],el=$('score-'+key);
    if(key==='player'){
      const handEl=$('hand-player');
      const slots=handEl.querySelectorAll('.card-slot');
      let vis=0,aces=0,hidden=0;
      slots.forEach((slot,i)=>{
        if(slot.querySelector('.card.flipped')){
          vis+=cardValue(p.cards[i].rank);
          if(p.cards[i].rank==='A')aces++;
        }else hidden++;
      });
      while(vis>21&&aces>0){vis-=10;aces--;}
      el.textContent=hidden>0?(vis>0?vis+'+?':'?'):handScore(p.cards);
      return;
    }
    if(key==='dealer'&&!p.stand&&p.cards.length===2){
      el.textContent=cardValue(p.cards[0].rank);
    }else{
      el.textContent=handScore(p.cards);
    }
  }
  function setStatus(key,text){$('status-'+key).textContent=text}
  function setAreaClass(key,cls){
    const el=$('area-'+key);el.className='player-area';
    if(cls)el.classList.add(cls);
  }
  function clearHand(key){
    $('hand-'+key).innerHTML='';
    $('score-'+key).textContent=key==='dealer'?'?':'0';
    $('status-'+key).textContent='';
    setAreaClass(key,'');
    players[key].cards=[];players[key].stand=false;
  }
  function clearPot(){
    potArea.querySelectorAll('.pot-chip').forEach(c=>c.remove());
    potArea.classList.remove('has-chips');
    potLabel.textContent='';
  }

  /* ===================== CARD RENDERING ===================== */
  function createCardEl(card,faceDown){
    const slot=document.createElement('div');
    slot.className='card-slot';
    const inner=document.createElement('div');
    inner.className='card'+(faceDown?'':' flipped');
    const back=document.createElement('div');
    back.className='card-face card-back';
    back.innerHTML=`<img src="cards/card_back.png" alt="back">`;
    const front=document.createElement('div');
    front.className='card-face card-front';
    front.innerHTML=`<img src="${card.img}" alt="${card.rank} ${card.suit}">`;
    inner.appendChild(back);inner.appendChild(front);
    slot.appendChild(inner);return slot;
  }

  function dealCardToHand(key,faceDown,delayMs){
    return new Promise(resolve=>{
      setTimeout(()=>{
        const card=deck.pop();
        players[key].cards.push(card);
        const el=createCardEl(card,faceDown);
        $('hand-'+key).appendChild(el);

        const deckRect=deckPile.getBoundingClientRect();
        const deckCX=deckRect.left+deckRect.width/2;
        const deckCY=deckRect.top+deckRect.height/2;

        requestAnimationFrame(()=>{
          const cr=el.getBoundingClientRect();
          const dx=deckCX-(cr.left+cr.width/2);
          const dy=deckCY-(cr.top+cr.height/2);
          el.style.setProperty('--deal-from',`translate(${dx}px,${dy}px) scale(0.5)`);
          el.classList.add('dealt');
        });

        AudioMgr.playFlip();

        if(!faceDown){
          setTimeout(()=>{el.querySelector('.card').classList.add('flipped')},180);
        }
        setScore(key);resolve(card);
      },delayMs);
    });
  }

  function flipCard(key,index){
    const slots=$('hand-'+key).querySelectorAll('.card-slot');
    if(slots[index]){
      slots[index].querySelector('.card').classList.add('flipped');
      AudioMgr.playFlip();
    }
  }

  /* ===================== POINTER HELPERS ===================== */
  function getPointerXY(e){
    if(e.touches&&e.touches.length>0)return{x:e.touches[0].clientX,y:e.touches[0].clientY};
    if(e.changedTouches&&e.changedTouches.length>0)return{x:e.changedTouches[0].clientX,y:e.changedTouches[0].clientY};
    return{x:e.clientX,y:e.clientY};
  }

  function makeDraggable(el,cb){
    function onStart(e){
      if(e.cancelable)e.preventDefault();
      const isTouch=e.type==='touchstart';
      const p=isTouch?e.touches[0]:e;
      const sx=p.clientX,sy=p.clientY;
      let active=true,lastX=sx,lastY=sy,lastT=Date.now(),vx=0,vy=0;

      if(cb.onStart)cb.onStart(e,{x:sx,y:sy});

      function onMove(e2){
        if(!active)return;
        if(e2.cancelable)e2.preventDefault();
        const pt=isTouch?e2.touches[0]:e2;
        const now=Date.now(),dt=Math.max(now-lastT,1);
        vx=(pt.clientX-lastX)/dt*1000;
        vy=(pt.clientY-lastY)/dt*1000;
        lastX=pt.clientX;lastY=pt.clientY;lastT=now;
        if(cb.onMove)cb.onMove(e2,{dx:pt.clientX-sx,dy:pt.clientY-sy},{x:sx,y:sy});
      }
      function onEnd(e2){
        if(!active)return;active=false;
        const pt=isTouch?(e2.changedTouches?e2.changedTouches[0]:{clientX:lastX,clientY:lastY}):e2;
        if(cb.onEnd)cb.onEnd(e2,{dx:pt.clientX-sx,dy:pt.clientY-sy},{x:sx,y:sy},{vx,vy});
        document.removeEventListener(isTouch?'touchmove':'mousemove',onMove);
        document.removeEventListener(isTouch?'touchend':'mouseup',onEnd);
        if(isTouch)document.removeEventListener('touchcancel',onEnd);
      }
      document.addEventListener(isTouch?'touchmove':'mousemove',onMove,{passive:false});
      document.addEventListener(isTouch?'touchend':'mouseup',onEnd);
      if(isTouch)document.addEventListener('touchcancel',onEnd);
    }
    el.addEventListener('mousedown',onStart);
    el.addEventListener('touchstart',onStart,{passive:false});
  }

  function isInRect(x,y,rect,pad=0){
    return x>=rect.left-pad&&x<=rect.right+pad&&y>=rect.top-pad&&y<=rect.bottom+pad;
  }

  /* ===================== CARD FLIP DRAG ===================== */
  const flipState=new WeakMap(); /* cardSlot → {flipped} */

  function attachFlipDrag(cardSlot){
    flipState.set(cardSlot,{flipped:false});
    const cardInner=cardSlot.querySelector('.card');

    /* individual drag for partial-flip preview */
    makeDraggable(cardSlot,{
      onStart(){
        if(flipState.get(cardSlot).flipped)return;
        cardInner.style.transition='none';
      },
      onMove(e,delta){
        if(flipState.get(cardSlot).flipped)return;
        const prog=Math.min(Math.abs(delta.dx)/100,1);
        cardInner.style.transform=`rotateY(${prog*180}deg)`;
        /* multi-card: check if pointer moved over a neighbouring flippable card */
        const p=getPointerXY(e);
        $('hand-player').querySelectorAll('.card-slot[data-flippable="true"]').forEach(s=>{
          if(s===cardSlot)return;
          const fs=flipState.get(s);
          if(!fs||fs.flipped)return;
          const r=s.getBoundingClientRect();
          if(p.x>=r.left&&p.x<=r.right&&p.y>=r.top&&p.y<=r.bottom){
            completeFlip(s);
          }
        });
      },
      onEnd(e,delta){
        if(flipState.get(cardSlot).flipped)return;
        if(Math.abs(delta.dx)/100>=0.38){
          completeFlip(cardSlot);
        }else{
          cardInner.style.transition='transform .25s ease';
          cardInner.style.transform='rotateY(0deg)';
          setTimeout(()=>{cardInner.style.transition='none'},260);
        }
      }
    });
  }

  function completeFlip(cardSlot){
    const fs=flipState.get(cardSlot);
    if(!fs||fs.flipped)return;
    fs.flipped=true;
    const cardInner=cardSlot.querySelector('.card');
    cardInner.style.transition='transform .25s ease';
    cardInner.classList.add('flipped');
    cardInner.style.transform='';
    cardSlot.removeAttribute('data-flippable');
    AudioMgr.playFlip();
    setScore('player');
    onPlayerCardFlipped();
  }

  function onPlayerCardFlipped(){
    const un=$('hand-player').querySelectorAll('.card-slot[data-flippable="true"]');
    if(un.length>0)return;
    if(gamePhase==='player-flip')proceedAfterFlip();
    else if(gamePhase==='player-flip-hit')onHitCardFlipped();
    else if(gamePhase==='player-flip-double')onDoubleCardFlipped();
  }

  /* ===================== DECK DRAG ===================== */
  function setupDeckDrag(){
    let ghost=null;
    makeDraggable(deckPile,{
      onStart(e){
        if(gamePhase!=='player-turn'||hitInProgress)return;
        deckPile.classList.add('active-drag');
        const p=getPointerXY(e);
        ghost=document.createElement('div');ghost.className='drag-ghost';
        ghost.innerHTML=`<img src="cards/card_back.png" style="width:var(--card-w);height:var(--card-h);border-radius:6px;box-shadow:0 3px 12px rgba(0,0,0,.5);">`;
        ghost.style.left=p.x+'px';ghost.style.top=p.y+'px';
        ghost.style.transform='translate(-50%,-50%) rotate(-4deg) scale(1.05)';
        document.body.appendChild(ghost);
      },
      onMove(e){
        if(!ghost)return;
        const p=getPointerXY(e);
        ghost.style.left=p.x+'px';ghost.style.top=p.y+'px';
        const pr=$('area-player').getBoundingClientRect();
        $('hand-player').classList.toggle('drop-target',isInRect(p.x,p.y,pr,35));
      },
      onEnd(e){
        deckPile.classList.remove('active-drag');
        if(ghost){ghost.remove();ghost=null;}
        $('hand-player').classList.remove('drop-target');
        if(gamePhase!=='player-turn'||hitInProgress)return;
        const p=getPointerXY(e);
        const pr=$('area-player').getBoundingClientRect();
        if(isInRect(p.x,p.y,pr,45))performHit();
      }
    });
  }

  /* ===================== CHIP DRAG + THROW ===================== */
  function setupChipDrag(){
    document.querySelectorAll('.chip').forEach(chip=>{
      let ghost=null,wasDragged=false;

      chip.addEventListener('click',()=>{
        if(wasDragged){wasDragged=false;return;}
        if(gamePhase!=='betting')return;
        const v=parseInt(chip.dataset.val);
        if(bet+v>balance)return;
        bet+=v;addChipToPot(v);updateBet();updateButtons();
        AudioMgr.playChipDrop();
      });

      makeDraggable(chip,{
        onStart(e){
          if(gamePhase!=='betting')return;
          const v=parseInt(chip.dataset.val);
          if(bet+v>balance)return;
          wasDragged=false;
          const p=getPointerXY(e);
          ghost=chip.cloneNode(true);
          ghost.className='drag-ghost chip '+[...chip.classList].filter(c=>c.startsWith('c')).join(' ');
          Object.assign(ghost.style,{
            position:'fixed',pointerEvents:'none',zIndex:'1000',
            width:'var(--chip-sz)',height:'var(--chip-sz)',borderRadius:'50%',
            display:'flex',alignItems:'center',justifyContent:'center',
            left:p.x+'px',top:p.y+'px',
            transform:'translate(-50%,-50%) scale(1.15)',transition:'none',
            border:'3px dashed rgba(255,255,255,.5)',
            fontWeight:'700',fontSize:'min(.55rem,1.8vw)',color:'#fff',
            textShadow:'0 1px 2px rgba(0,0,0,.6)'
          });
          document.body.appendChild(ghost);
        },
        onMove(e,delta){
          if(!ghost)return;wasDragged=true;
          const p=getPointerXY(e);
          ghost.style.left=p.x+'px';ghost.style.top=p.y+'px';
          const r=potArea.getBoundingClientRect();
          potArea.classList.toggle('drag-over',isInRect(p.x,p.y,r,40));
        },
        onEnd(e,delta,start,velocity){
          potArea.classList.remove('drag-over');
          if(!ghost||!wasDragged||gamePhase!=='betting'){
            if(ghost){ghost.remove();ghost=null;}return;
          }
          const v=parseInt(chip.dataset.val);
          if(bet+v>balance){ghost.remove();ghost=null;return;}

          const p=getPointerXY(e);
          const pr=potArea.getBoundingClientRect();
          const potCX=pr.left+pr.width/2,potCY=pr.top+pr.height/2;
          const overPot=isInRect(p.x,p.y,pr,45);

          const vxv=velocity?velocity.vx:0,vyv=velocity?velocity.vy:0;
          const speed=Math.sqrt(vxv*vxv+vyv*vyv);
          const tpx=potCX-p.x,tpy=potCY-p.y;
          const dist=Math.sqrt(tpx*tpx+tpy*tpy);
          const dot=dist>0?(vxv*tpx+vyv*tpy)/dist:0;
          const throwOk=speed>200&&dot>80;

          if(overPot||throwOk){
            animateChipSlide(ghost,p.x,p.y,vxv,vyv,potCX,potCY,()=>{
              ghost.remove();ghost=null;
              bet+=v;addChipToPot(v);updateBet();updateButtons();
            });
          }else{
            ghost.style.transition='all .25s ease';
            ghost.style.transform='translate(-50%,-50%) scale(.4)';
            ghost.style.opacity='0';
            setTimeout(()=>{if(ghost){ghost.remove();ghost=null;}},260);
          }
        }
      });
    });
  }

  function animateChipSlide(el,sx,sy,vx,vy,tx,ty,onDone){
    const friction=.95;
    const stopThreshold=.35;
    let x=sx,y=sy;
    let cvx=vx/60,cvy=vy/60;
    const frameRect=$('game-frame').getBoundingClientRect();

    function frame(){
      cvx*=friction;cvy*=friction;
      x+=cvx;y+=cvy;
      /* bounce off game frame edges */
      if(x<frameRect.left+10){x=frameRect.left+10;cvx=-cvx*.3;}
      if(x>frameRect.right-10){x=frameRect.right-10;cvx=-cvx*.3;}
      if(y<frameRect.top+10){y=frameRect.top+10;cvy=-cvy*.3;}
      if(y>frameRect.bottom-10){y=frameRect.bottom-10;cvy=-cvy*.3;}
      el.style.left=x+'px';el.style.top=y+'px';
      const spd=Math.sqrt(cvx*cvx+cvy*cvy);
      if(spd<stopThreshold){
        /* chip stopped — snap to pot center */
        el.style.transition='left .3s ease, top .3s ease, transform .3s ease, opacity .3s ease';
        el.style.left=tx+'px';el.style.top=ty+'px';
        el.style.transform='translate(-50%,-50%) scale(.6)';
        el.style.opacity='.6';
        setTimeout(()=>{
          AudioMgr.playChipDrop();
          onDone();
        },320);
      }else requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  }

  function addChipToPot(val){
    const c=document.createElement('div');
    c.className=`pot-chip c${val}`;
    const n=potArea.querySelectorAll('.pot-chip').length;
    const ox=(Math.random()-.5)*12,oy=-n*2.5;
    c.style.transform=`translate(${ox}px,${oy}px)`;
    c.textContent='$'+val;potArea.appendChild(c);
  }

  /* ===================== SHUFFLE (in-place) ===================== */
  function showShuffle(){
    return new Promise(resolve=>{
      AudioMgr.playShuffle();
      const cards=deckPile.querySelectorAll('.deck-card');
      cards.forEach(c=>c.classList.add('shuffling'));
      setTimeout(()=>{
        cards.forEach(c=>c.classList.remove('shuffling'));
        resolve();
      },1800);
    });
  }

  /* ===================== BUTTON STATE MACHINE ===================== */
  let gamePhase='idle';

  function updateButtons(){
    btnTop.disabled=true;btnBottom.disabled=true;
    btnTop.classList.remove('glow');btnBottom.classList.remove('glow');
    btnTop.style.display='none';btnBottom.style.display='none';

    switch(gamePhase){
      case 'idle':
        btnBottom.style.display='block';
        btnBottom.textContent='NEW ROUND';
        btnBottom.disabled=false;
        btnBottom.classList.add('glow');
        break;
      case 'betting':
        btnTop.style.display='block';
        btnTop.textContent='DEAL';
        btnTop.disabled=(bet===0);
        break;
      case 'player-turn':
        btnTop.style.display='block';
        btnTop.textContent='HIT';
        btnTop.disabled=false;
        btnBottom.style.display='block';
        btnBottom.textContent='STAND';
        btnBottom.disabled=false;
        break;
      case 'player-flip':
      case 'player-flip-hit':
      case 'player-flip-double':
        // show nothing - player must flip cards
        break;
      case 'result':
        btnBottom.style.display='block';
        btnBottom.textContent='NEW ROUND';
        btnBottom.disabled=false;
        btnBottom.classList.add('glow');
        break;
    }
  }

  /* ===================== BUTTON HANDLERS ===================== */
  btnTop.addEventListener('click',()=>{
    if(btnTop.disabled)return;
    AudioMgr.playClick();
    if(gamePhase==='betting'&&bet>0)doDeal();
    else if(gamePhase==='player-turn')performHit();
  });
  btnBottom.addEventListener('click',()=>{
    if(btnBottom.disabled)return;
    AudioMgr.playClick();
    if(gamePhase==='player-turn')doStand();
    else if(gamePhase==='result'||gamePhase==='idle')doNewRound();
  });

  /* ---- NEW ROUND ---- */
  async function doNewRound(){
    if(balance<=0){balance=1000;updateBalance();}
    bet=0;updateBet();clearPot();
    for(const k of order)clearHand(k);

    deck=shuffleDeck(buildDeck());
    await showShuffle();

    gamePhase='betting';
    msg('Throw chips onto the table to bet');
    updateButtons();
  }

  /* ---- DEAL ---- */
  async function doDeal(){
    if(gamePhase!=='betting'||bet===0)return;
    gamePhase='dealing';updateButtons();
    msg('Dealing...');

    const dd=200;
    for(let round=0;round<2;round++){
      for(const k of order){
        const fd=(k==='player')||(k==='dealer'&&round===1);
        await dealCardToHand(k,fd,dd);
      }
    }

    gamePhase='bots-play';updateButtons();
    await botsPlay();

    /* attach flip AFTER bots finish so player can't flip early */
    const playerSlots=$('hand-player').querySelectorAll('.card-slot');
    playerSlots.forEach(slot=>{
      slot.setAttribute('data-flippable','true');
      attachFlipDrag(slot);
    });

    gamePhase='player-flip';
    setAreaClass('player','active-turn');
    msg('Swipe your cards to flip');
    updateButtons();
  }

  function proceedAfterFlip(){
    const pS=handScore(players.player.cards);
    const dS=handScore(players.dealer.cards);

    if(pS===21&&dS===21){
      revealDealer();msg('Both Blackjack! Push.');
      setStatus('player','PUSH');setStatus('dealer','BLACKJACK');
      setAreaClass('player','push');setAreaClass('dealer','blackjack');
      endRound('push');return;
    }
    if(pS===21){
      revealDealer();msg('Blackjack! You win 3:2!');
      setStatus('player','BLACKJACK');setAreaClass('player','blackjack');
      endRound('blackjack');return;
    }

    gamePhase='player-turn';
    msg('Hit or Stand');
    updateButtons();
  }

  /* ---- HIT ---- */
  async function performHit(){
    if(hitInProgress)return;hitInProgress=true;
    gamePhase='player-flip-hit';updateButtons();

    await dealCardToHand('player',true,0);
    const slots=$('hand-player').querySelectorAll('.card-slot');
    const ns=slots[slots.length-1];
    ns.setAttribute('data-flippable','true');
    attachFlipDrag(ns);
    msg('Flip your card');
  }

  function onHitCardFlipped(){
    hitInProgress=false;
    const s=handScore(players.player.cards);
    if(s>21){
      setStatus('player','BUST');setAreaClass('player','bust');
      msg('Bust!');players.player.stand=true;
      dealerPlay().then(()=>resolveRound());
    }else if(s===21){
      players.player.stand=true;setAreaClass('player','');
      dealerPlay().then(()=>resolveRound());
    }else{
      gamePhase='player-turn';msg('Hit or Stand');updateButtons();
    }
  }

  function onDoubleCardFlipped(){
    hitInProgress=false;
    const s=handScore(players.player.cards);
    players.player.stand=true;
    if(s>21){setStatus('player','BUST');setAreaClass('player','bust');msg('Bust on double!');}
    else msg('Doubled down.');
    setAreaClass('player','');
    dealerPlay().then(()=>resolveRound());
  }

  /* ---- STAND ---- */
  async function doStand(){
    if(gamePhase!=='player-turn')return;
    gamePhase='dealer-play';updateButtons();
    players.player.stand=true;setAreaClass('player','');
    msg('You stand.');
    await dealerPlay();resolveRound();
  }

  /* ===================== BOT AI ===================== */
  async function botsPlay(){
    for(const bk of botKeys){
      setAreaClass(bk,'active-turn');await sleep(350);
      while(true){
        const s=handScore(players[bk].cards);
        if(s>=21)break;
        const hasAce=players[bk].cards.some(c=>c.rank==='A');
        const raw=players[bk].cards.reduce((a,c)=>a+cardValue(c.rank),0);
        const soft17=(s===17&&hasAce&&raw!==17);
        if(s<17||soft17){
          await dealCardToHand(bk,false,280);
          const sl=$('hand-'+bk).querySelectorAll('.card-slot');
          sl[sl.length-1].querySelector('.card').classList.add('flipped');
          await sleep(350);
        }else break;
      }
      const fs=handScore(players[bk].cards);
      players[bk].stand=true;
      if(fs>21){setStatus(bk,'BUST');setAreaClass(bk,'bust');}
      else{setStatus(bk,fs+'');setAreaClass(bk,'');}
    }
  }

  /* ===================== DEALER ===================== */
  function revealDealer(){
    flipCard('dealer',1);
    $('score-dealer').textContent=handScore(players.dealer.cards);
  }

  async function dealerPlay(){
    gamePhase='dealer-play';updateButtons();
    revealDealer();setAreaClass('dealer','active-turn');await sleep(450);

    while(handScore(players.dealer.cards)<17){
      await dealCardToHand('dealer',false,350);
      const sl=$('hand-dealer').querySelectorAll('.card-slot');
      sl[sl.length-1].querySelector('.card').classList.add('flipped');
      setScore('dealer');await sleep(450);
    }
    players.dealer.stand=true;
    const ds=handScore(players.dealer.cards);
    if(ds>21){setStatus('dealer','BUST');setAreaClass('dealer','bust');}
    else{setStatus('dealer',ds+'');setAreaClass('dealer','');}
  }

  /* ===================== RESOLVE ===================== */
  function resolveRound(){
    gamePhase='result';
    const ds=handScore(players.dealer.cards),dBust=ds>21;

    for(const bk of botKeys){
      const bs=handScore(players[bk].cards);
      if(bs>21)setAreaClass(bk,'bust');
      else if(dBust||bs>ds){setStatus(bk,'WIN');setAreaClass(bk,'win');}
      else if(bs===ds){setStatus(bk,'PUSH');setAreaClass(bk,'push');}
      else{setStatus(bk,'LOSE');setAreaClass(bk,'lose');}
    }

    const ps=handScore(players.player.cards);
    if(ps>21){
      balance-=bet;msg('Bust! -$'+bet);
      setAreaClass('player','bust');setStatus('player','-$'+bet);
      showBalancePopup(-bet);
    }else if(dBust||ps>ds){
      balance+=bet;msg('You win +$'+bet+'!');
      setAreaClass('player','win');setStatus('player','+$'+bet);
      showBalancePopup(bet);
    }else if(ps===ds){
      msg('Push.');setAreaClass('player','push');setStatus('player','PUSH');
    }else{
      balance-=bet;msg('Dealer wins. -$'+bet);
      setAreaClass('player','lose');setStatus('player','-$'+bet);
      showBalancePopup(-bet);
    }
    updateBalance();updateButtons();
    if(balance<=0)msg('Broke! Press NEW ROUND to reset.');
  }

  function endRound(type){
    gamePhase='result';
    if(type==='blackjack'){const w=Math.floor(bet*1.5);balance+=w;setStatus('player','+$'+w);showBalancePopup(w);}
    const ds=handScore(players.dealer.cards),dBust=ds>21;
    for(const bk of botKeys){
      const bs=handScore(players[bk].cards);
      if(bs>21)setAreaClass(bk,'bust');
      else if(dBust||bs>ds){setStatus(bk,'WIN');setAreaClass(bk,'win');}
      else if(bs===ds){setStatus(bk,'PUSH');setAreaClass(bk,'push');}
      else{setStatus(bk,'LOSE');setAreaClass(bk,'lose');}
    }
    updateBalance();updateButtons();
  }

  /* ===================== BALANCE POPUP ===================== */
  function showBalancePopup(amount){
    const pop=document.createElement('div');
    const isWin=amount>0;
    pop.className='balance-popup '+(isWin?'win':'lose');
    pop.textContent=(isWin?'+':'')+('$'+Math.abs(amount));
    /* position near the balance text */
    const bRect=balEl.getBoundingClientRect();
    const fRect=$('game-frame').getBoundingClientRect();
    pop.style.left=(bRect.left-fRect.left+bRect.width/2)+'px';
    pop.style.top=(bRect.top-fRect.top-8)+'px';
    pop.style.transform='translateX(-50%)';
    $('game-frame').appendChild(pop);
    setTimeout(()=>pop.remove(),950);
  }

  /* ===================== UTIL ===================== */
  function sleep(ms){return new Promise(r=>setTimeout(r,ms))}

  /* ===================== INIT ===================== */
  setupDeckDrag();
  setupChipDrag();
  msg('Press NEW ROUND to start');
  gamePhase='idle';
  updateBalance();
  updateButtons();
})();
</script>
