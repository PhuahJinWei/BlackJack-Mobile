<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
	<title>Blackjack Simulator</title>
	<link rel="icon" type="image/png" href="./asset/cards/card_hearts_A.png">
	<link rel="stylesheet" type="text/css" href=./asset/Style.css>
</head>
<body>
	<div id="game-frame">
	  
		<!-- --------------- Dealer --------------- -->
		<div class="seat seat-dealer">
			<div class="player-area" id="area-dealer">
			<div class="label"><span class="name">Dealer</span><span class="score" id="score-dealer">?</span><span class="status" id="status-dealer"></span></div>
			<div class="hand" id="hand-dealer"></div>
			</div>
		</div>

		<!-- --------------- Left Player --------------- -->
		<div class="seat seat-left">
			<div class="player-area" id="area-bot1">
			<div class="label"><span class="name">Alice</span><span class="score" id="score-bot1">0</span><span class="status" id="status-bot1"></span></div>
			<div class="hand" id="hand-bot1"></div>
			</div>
		</div>

		<!-- --------------- Right Player --------------- -->
		<div class="seat seat-right">
			<div class="player-area" id="area-bot2">
			<div class="label"><span class="name">Bob</span><span class="score" id="score-bot2">0</span><span class="status" id="status-bot2"></span></div>
			<div class="hand" id="hand-bot2"></div>
		</div>
		</div>

		<!-- --------------- Center --------------- -->
		<div id="table-center">
			<div id="deck-pile">
			<img src="asset/cards/card_back.png" class="deck-card" style="top:0;left:0" alt="">
			<img src="asset/cards/card_back.png" class="deck-card" style="top:-2px;left:1px" alt="">
			<img src="asset/cards/card_back.png" class="deck-card" style="top:-4px;left:2px" alt="">
			<img src="asset/cards/card_back.png" class="deck-card" style="top:-6px;left:1px" alt="">
			<img src="asset/cards/card_back.png" class="deck-card" style="top:-8px;left:2px" alt="">
			</div>
			<div id="pot-area"><span id="pot-label"></span></div>
		</div>

		<!-- --------------- Player --------------- -->
		<div class="seat seat-player">
			<div class="player-area" id="area-player">
			<div class="label"><span class="name">You</span><span class="score" id="score-player">0</span><span class="status" id="status-player"></span></div>
			<div class="hand" id="hand-player"></div>
			</div>
		</div>

		
		<div id="message"></div>


		<!-- --------------- Buttons --------------- -->
		<div id="btn-group">
			<button class="btn" id="btn-top">DEAL</button>
			<button class="btn" id="btn-bottom">NEW ROUND</button>
		</div>

		<!-- --------------- Chips --------------- -->
		<div id="chips-bar">
			<div class="chip-stack"><span class="chip c5" data-val="5">$5</span></div>
			<div class="chip-stack"><span class="chip c10" data-val="10">$10</span></div>
			<div class="chip-stack"><span class="chip c25" data-val="25">$25</span></div>
			<div class="chip-stack"><span class="chip c50" data-val="50">$50</span></div>
			<div class="chip-stack"><span class="chip c100" data-val="100">$100</span></div>
		</div>
	
		<!-- --------------- Bet info --------------- -->
		<div id="bet-info">
			<span>Bet: <strong id="current-bet">$0</strong><span id="multiplier"></span></span>
			<span>Balance: <strong id="balance">$1000</strong></span>
		</div>
		<div id="wood-rim"></div>
	</div>
	
	<script src="./asset/Script.js"></script>

</body>
</html>
